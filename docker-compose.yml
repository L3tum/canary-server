version: '3.8'

services:
  asr-server:
    build: .
    image: nemo-asr-server
    container_name: nemo-asr-server
    environment:
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-your-secret-api-key}
      - MODEL_NAME=${MODEL_NAME:-nvidia/canary-1b-v2}
      - PARALLEL_SIZE=${PARALLEL_SIZE:-2}
      - RATE_LIMIT=${RATE_LIMIT:-30/minute}
      - MODEL_TYPE=audio
      - MODEL_TASK=speech_to_text
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data  # Mount local data directory
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data: